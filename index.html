<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Literacy Learning Platform</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="A complete digital literacy learning platform for absolute beginners. Learn to use computers from zero knowledge to confident daily use.">
</head>
<body>

<!-- ========== TOAST CONTAINER ========== -->
<div class="toast-container" id="toastContainer"></div>

<!-- ========== CONFETTI ========== -->
<div class="confetti-container" id="confettiContainer"></div>

<!-- ========== NAME MODAL ========== -->
<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <div style="text-align:center;">
      <div style="font-size:3.5rem; margin-bottom:16px;">👋</div>
      <h2 style="font-weight:800; font-size:1.5rem; margin-bottom:8px;">Welcome to Your Computer Learning Journey!</h2>
      <p style="color:var(--text-muted); margin-bottom:24px;">This platform will teach you everything you need to know, one step at a time. What is your name?</p>
      <input type="text" id="nameModalInput" class="typing-input-field" placeholder="Type your name here..." style="max-width:320px; margin:0 auto 16px; display:block;">
      <button class="btn btn-primary btn-block" onclick="saveNameFromModal()" style="max-width:320px; margin:0 auto;">
        🚀 Start Learning!
      </button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('nameModal').classList.remove('open')" style="margin-top:10px; display:block; margin-left:auto; margin-right:auto;">
        Skip for now
      </button>
    </div>
  </div>
</div>

<!-- ========== APP WRAPPER ========== -->
<div class="app-wrapper">

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">💡</div>
      <h1>Digital Literacy</h1>
      <div class="tagline">Learn computers with confidence</div>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar">👩</div>
      <div class="user-info">
        <div class="user-name">Learner</div>
        <div class="user-level">0 lessons complete</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>

      <button class="nav-item" data-nav="home" onclick="navigate('home')">
        <span class="nav-icon">🏠</span> Home
      </button>

      <button class="nav-item" data-nav="lessons" onclick="navigate('lessons')">
        <span class="nav-icon">📚</span> All Lessons
      </button>

      <button class="nav-item" data-nav="typing" onclick="navigate('typing')">
        <span class="nav-icon">⌨️</span> Typing Practice
      </button>

      <div class="nav-section-label">Track</div>

      <button class="nav-item" data-nav="progress" onclick="navigate('progress')">
        <span class="nav-icon">📊</span> My Progress
      </button>

      <button class="nav-item" data-nav="achievements" onclick="navigate('achievements')">
        <span class="nav-icon">🏆</span> Achievements
      </button>

      <div class="nav-section-label">Help</div>

      <button class="nav-item" data-nav="help" onclick="navigate('help')">
        <span class="nav-icon">💛</span> Feeling Stuck?
      </button>

      <button class="nav-item" data-nav="troubleshoot" onclick="navigate('troubleshoot')">
        <span class="nav-icon">🔧</span> Fix Problems
      </button>

      <div class="nav-section-label">More</div>

      <button class="nav-item" data-nav="settings" onclick="navigate('settings')">
        <span class="nav-icon">⚙️</span> Settings
      </button>
    </nav>

    <div class="sidebar-progress">
      <div class="progress-label">
        <span>Overall Progress</span>
        <span>0%</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:0%"></div>
      </div>
    </div>
  </aside>

  <!-- ========== MAIN CONTENT ========== -->
  <div class="main-content">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div style="display:flex; align-items:center; gap:14px;">
        <button class="hamburger" id="hamburgerBtn" aria-label="Menu">☰</button>
        <span class="topbar-title" id="topbarTitle">🏠 Welcome Home</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" onclick="navigate('help')" title="Get Help">💛 Help</button>
        <button class="btn btn-ghost btn-sm" onclick="navigate('settings')" title="Settings">⚙️</button>
      </div>
    </div>

    <!-- ========== PAGES ========== -->
    <div class="page-area">

      <!-- HOME -->
      <div class="page" id="page-home"></div>

      <!-- LESSONS -->
      <div class="page" id="page-lessons"></div>

      <!-- LESSON DETAIL -->
      <div class="page" id="page-lesson-detail"></div>

      <!-- QUIZ -->
      <div class="page" id="page-quiz"></div>

      <!-- TYPING -->
      <div class="page" id="page-typing"></div>

      <!-- PROGRESS -->
      <div class="page" id="page-progress"></div>

      <!-- HELP -->
      <div class="page" id="page-help"></div>

      <!-- TROUBLESHOOT -->
      <div class="page" id="page-troubleshoot"></div>

      <!-- ACHIEVEMENTS -->
      <div class="page" id="page-achievements"></div>

      <!-- SETTINGS -->
      <div class="page" id="page-settings"></div>

    </div><!-- end page-area -->

  </div><!-- end main-content -->

</div><!-- end app-wrapper -->

<!-- ========== SCRIPTS ========== -->
<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
